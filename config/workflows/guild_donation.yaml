# Guild Donation Workflow Configuration
# Complete automation workflow for guild donation across multiple characters
#
# This workflow demonstrates:
# - Explicit step IDs and next links
# - All action types: click, wait, press, scroll, wait_image
# - Conditional branching with image detection
# - Loop path for character iteration
# - Intelligent image-based waits replacing hardcoded delays
# - Recovery anchors for error rollback (ERR-02 compliance)

name: guild_donation
start_step_id: open_guild_menu

wait_defaults:
  timeout_ms: 10000
  poll_interval_ms: 50
  retry_interval_ms: 1000

steps:
  # Step 1: Open guild menu with Alt+U
  # RECOVERY ANCHOR: Stable entry point for guild donation workflow
  - step_id: open_guild_menu
    action:
      type: press
      key_name: alt+u
    next: wait_menu_appear
    retry: 1
    recovery:
      anchor: true
      audit_context:
        phase: donation
        critical: true

  # Step 2: Wait for guild menu to appear (intelligent wait)
  # Recovery: rollback to anchor if menu doesn't appear
  # ROI: 546,803,903,835, 宽高(357,32) - 对比缓存 guild_ui.bmp
  - step_id: wait_menu_appear
    action:
      type: wait_image
      state: appear
      image: guild_ui.bmp
      roi: [546, 803, 903, 835]
      timeout_ms: 5000
      poll_interval_ms: 100
    next: check_first_confirm
    recovery:
      on_timeout: open_guild_menu
      max_escalations: 3
      audit_context:
        phase: donation
        step_type: wait_menu

  # Step 3: Check for first-time guild confirm popup
  # ROI: 1229,657,1331,937, 宽高(102,280)
  # If detected, handle it; if not, proceed to Stage 4
  - step_id: check_first_confirm
    action:
      type: wait
      duration_ms: 100
    on_true: handle_first_confirm
    on_false: stage4_first_donation
    condition:
      type: image
      template: assets/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8

  # Step 3a: Handle first confirm popup (if detected)
  # 在安全区域内随机点击（缩小10%避免边缘点击）
  - step_id: handle_first_confirm
    action:
      type: click_detected
      image: assets/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8
      shrink_percent: 0.10
    next: stage4_first_donation

  # Step 4: Stage 4 - Guild donation workflow
  # ROI: 1863,450,2019,483, 宽高(156,33)
  # Detect guild_first_donation.bmp and click
  # y_offset: 0.33 限制点击区域，跳过上三分之一不可点击区域
  - step_id: stage4_first_donation
    action:
      type: click_detected
      image: assets/guild_first_donation.bmp
      roi: [1863, 450, 2019, 483]
      threshold: 0.8
      shrink_percent: 0.10
      y_offset: 0.33
    next: stage4_second_donation

  # Step 4b: Second donation detection
  # ROI: 954,702,1077,742, 宽高(123,40)
  # Detect guild_first_donation2.bmp and click
  - step_id: stage4_second_donation
    action:
      type: click_detected
      image: assets/guild_first_donation2.bmp
      roi: [954, 702, 1077, 742]
      threshold: 0.8
      shrink_percent: 0.10
    next: check_sec_donation

  # Step 5: Check for secondary donation (支援金捐献)
  # ROI: 1551,606,1693,635, 宽高(142,29)
  # If detected, proceed to click; if not, output "当日无支援" and exit
  - step_id: check_sec_donation
    action:
      type: wait
      duration_ms: 100
    on_true: click_sec_donation1
    on_false: no_support_today
    condition:
      type: image
      template: assets/guild_sec_donation1.bmp
      roi: [1551, 606, 1693, 635]
      threshold: 0.8

  # Step 5a: Click guild_sec_donation1 (if detected)
  # y_offset: 0.5 限制点击区域，跳过上二分之一不可点击区域
  - step_id: click_sec_donation1
    action:
      type: click_detected
      image: assets/guild_sec_donation1.bmp
      roi: [1551, 606, 1693, 635]
      threshold: 0.8
      shrink_percent: 0.10
      y_offset: 0.5
    next: wait_sec_donation2

  # Step 5b: Wait for guild_sec_donation2 to appear (1s timeout, fast polling)
  # ROI: 1010,602,1253,794, 宽高(243,192)
  # Wait up to 1 second with 100ms poll interval
  - step_id: wait_sec_donation2
    action:
      type: wait_image
      state: appear
      image: assets/guild_sec_donation2.bmp
      roi: [1010, 602, 1253, 794]
      timeout_ms: 1000
      poll_interval_ms: 100
      threshold: 0.7
    next: click_sec_donation2

  # Step 5c: Click detected guild_sec_donation2 at random position in ROI
  - step_id: click_sec_donation2
    action:
      type: click_detected
      image: assets/guild_sec_donation2.bmp
      roi: [1010, 602, 1253, 794]
      threshold: 0.7
      shrink_percent: 0.10
    next: click_sec_donation2_fixed

  # Step 5d: Click at fixed position (1229, 937) with Y +/- 5px random
  # Hardcoded coordinates with small vertical randomization
  - step_id: click_sec_donation2_fixed
    action:
      type: click
      x: 1229
      y: 937
      random_y: 5
    next: donation_complete

  # Step 5d: No support today - press ESC and exit
  - step_id: no_support_today
    action:
      type: press
      key_name: esc
    next: null

  # Step 6: Donation complete
  - step_id: donation_complete
    action:
      type: wait
      duration_ms: 100
    next: write_donation_cache

  # Step 6a: Write character donation status to cache
  # Placeholder: Records character ID (visual hash) and donation completion
  # TODO: Implement custom action type 'write_cache' in workflow_runtime.py
  - step_id: write_donation_cache
    action:
      type: wait
      duration_ms: 50
    next: press_esc_close

  # Step 6b: Press ESC to close guild menu
  - step_id: press_esc_close
    action:
      type: press
      key_name: esc
    next: wait_guild_ui_close

  # Step 7: Workflow complete (fallback)
  - step_id: workflow_complete
    action:
      type: wait
      duration_ms: 100
    next: null
