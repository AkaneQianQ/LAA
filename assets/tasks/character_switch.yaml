# Character Switch + Donation Workflow
# Aligned flow:
# 1) ESC detect switch button (2 attempts)
# 2) Resolve account tag by pHash (must exist)
# 3) First character (slot 0) donation with daily skip
# 4-6) Remaining characters traversal handled by custom action

name: character_switch
start_step_id: press_esc_first

wait_defaults:
  timeout_ms: 10000
  poll_interval_ms: 50
  retry_interval_ms: 1000

steps:
  - step_id: press_esc_first
    action:
      type: press
      key_name: esc
    next: wait_after_esc_first

  - step_id: wait_after_esc_first
    action:
      type: wait
      duration_ms: 120
    next: detect_switch_after_esc_first

  - step_id: detect_switch_after_esc_first
    recognition:
      type: custom
      custom_recognition: SwitchCharacterVisible
      param:
        template: assets/resource/image/switchCharacter.bmp
        roi: [575, 907, 856, 952]
        threshold: 0.75
        timeout_ms: 1000
        poll_interval_ms: 100
    on_true: resolve_account_tag
    on_false: press_esc_second

  - step_id: press_esc_second
    action:
      type: press
      key_name: esc
    next: wait_after_esc_second

  - step_id: wait_after_esc_second
    action:
      type: wait
      duration_ms: 120
    next: detect_switch_after_esc_second

  - step_id: detect_switch_after_esc_second
    recognition:
      type: custom
      custom_recognition: SwitchCharacterVisible
      param:
        template: assets/resource/image/switchCharacter.bmp
        roi: [575, 907, 856, 952]
        threshold: 0.75
        timeout_ms: 1000
        poll_interval_ms: 100
    on_true: resolve_account_tag
    on_false: switch_button_not_found_error

  - step_id: resolve_account_tag
    recognition:
      type: custom
      custom_recognition: ResolveAccountByTag
      param:
        roi: [666, 793, 772, 902]
        phash_threshold: 10
        db_path: data/accounts.db
        data_dir: data
        create_if_missing: false
    on_true: check_first_character_done_today
    on_false: account_not_indexed_error

  - step_id: check_first_character_done_today
    recognition:
      type: custom
      custom_recognition: AccountCharacterDoneToday
      param:
        slot_index: 0
        db_path: data/accounts.db
    on_true: process_remaining_characters
    on_false: first_character_donation_entry

  - step_id: first_character_donation_entry
    action:
      type: press
      key_name: esc
    next: wait_after_first_donation_esc

  - step_id: wait_after_first_donation_esc
    action:
      type: wait
      duration_ms: 120
    next: wait_switch_button_disappear_for_first

  - step_id: wait_switch_button_disappear_for_first
    action:
      type: wait_image
      state: disappear
      image: assets/resource/image/switchCharacter.bmp
      roi: [575, 907, 856, 952]
      timeout_ms: 1000
      poll_interval_ms: 100
    next: execute_first_character_donation

  - step_id: execute_first_character_donation
    action:
      type: custom
      custom_action: ExecuteDonation
    next: mark_first_character_done

  - step_id: mark_first_character_done
    action:
      type: custom
      custom_action: MarkAccountCharacterDone
      param:
        slot_index: 0
        db_path: data/accounts.db
    next: process_remaining_characters

  - step_id: process_remaining_characters
    action:
      type: custom
      custom_action: ProcessRemainingDonations
      param:
        db_path: data/accounts.db
        switch_template: assets/resource/image/switchCharacter.bmp
        switch_roi: [575, 907, 856, 952]
        switch_timeout_ms: 1000
        poll_interval_ms: 100
        switch_check_template: assets/resource/image/CharacterSwitchCheck.bmp
        switch_check_roi: [1308, 912, 1580, 947]
        switch_check_threshold: 0.62
        switch_check_timeout_ms: 1800
        max_esc_open_attempts: 5
        dedupe_similarity_threshold: 0.992
        dedupe_mad_threshold: 8.0
        dedupe_shape_distance_threshold: 10.0
        allow_unverified_target_click: true
        dedupe_center_similarity_threshold: 0.995
        dedupe_center_mad_threshold: 4.0
        dedupe_text_hamming_threshold: 6
        dedupe_center_hamming_threshold: 6
        dedupe_fusion_threshold: 0.97
        login_template: assets/resource/image/loginButton.bmp
        login_roi: [1308, 912, 1441, 948]
        confirm_template: assets/resource/image/ConfirmButton2.bmp
        confirm_roi: [1176, 700, 1278, 1100]
        load_pixel_x: 973
        load_pixel_y: 1146
        load_pixel_rgb: [148, 12, 8]
        load_pixel_tolerance: 18
        load_color_timeout_ms: 20000
        load_color_min_consecutive_hits: 2
        safe_x: 1689
        safe_y: 698
        bottom_template: assets/resource/image/Buttom.bmp
        bottom_roi: [1682, 815, 1698, 861]
        bottom_threshold: 0.95
        slot_click_settle_ms: 150
        max_switch_loops: 24
    next: workflow_complete

  - step_id: switch_button_not_found_error
    action:
      type: error
      error_code: SWITCH_BUTTON_NOT_FOUND
      message: "未检测到 switchCharacter.bmp，ESC 两次失败"
    next: null

  - step_id: account_not_indexed_error
    action:
      type: error
      error_code: ACCOUNT_TAG_UNKNOWN
      message: "请录入账号信息"
    next: null

  - step_id: workflow_complete
    action:
      type: wait
      duration_ms: 50
    next: null
