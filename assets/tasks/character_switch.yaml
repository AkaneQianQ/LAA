# Character Switch Workflow Configuration
# Workflow for switching to a specific character from character selection screen
#
# This workflow:
# - Identifies target character slot from visual hash comparison
# - Handles scrolling to locate the target character
# - Clicks the character and initiates login
# - Waits for character to be online

name: character_switch
start_step_id: verify_character_selection_screen

wait_defaults:
  timeout_ms: 10000
  poll_interval_ms: 50
  retry_interval_ms: 1000

steps:
  # Step 0: Verify we are on character selection screen
  # RECOVERY ANCHOR: Stable entry point for character switch workflow
  - step_id: verify_character_selection_screen
    action:
      type: wait_image
      state: appear
      image: assets/character_selection_ui.bmp
      roi: [500, 500, 1000, 800]
      threshold: 0.7
      timeout_ms: 5000
      poll_interval_ms: 100
    next: scroll_to_top
    retry: 1
    recovery:
      anchor: true
      audit_context:
        phase: switch
        critical: true

  # Step 1: Scroll to top to ensure consistent starting position
  - step_id: scroll_to_top
    action:
      type: scroll
      direction: up
      ticks: 10
    next: wait_after_scroll_top

  - step_id: wait_after_scroll_top
    action:
      type: wait
      duration_ms: 300
    next: scan_current_visible_slots

  # Step 2: Scan currently visible slots to find target character
  # Compare against database for target character hash
  - step_id: scan_current_visible_slots
    action:
      type: detect_character_in_slots
      slots:
        - roi: [904, 557, 1152, 624]
          slot_id: 1_1
        - roi: [1164, 557, 1412, 624]
          slot_id: 1_2
        - roi: [1425, 557, 1673, 624]
          slot_id: 1_3
        - roi: [904, 557, 1152, 624]
          slot_id: 2_1
        - roi: [1164, 557, 1412, 624]
          slot_id: 2_2
        - roi: [1425, 557, 1673, 624]
          slot_id: 2_3
    next: check_target_found

  # Step 3: Check if target character was found in current view
  - step_id: check_target_found
    action:
      type: wait
      duration_ms: 100
    on_true: click_target_character
    on_false: scroll_and_continue_search
    condition:
      type: character_found
      target_key: target_character_hash

  # Step 4a: Target found - click on the character slot
  # Uses detected position with safe-area randomization
  - step_id: click_target_character
    action:
      type: click_detected_character
      target_key: target_character_hash
      shrink_percent: 0.10
    next: wait_after_character_click

  # Step 4b: Wait after character click
  - step_id: wait_after_character_click
    action:
      type: wait
      duration_ms: 200
    next: click_login_button

  # Step 5: Click the login button (yellow button)
  # ROI: Login button area (1200, 880, 1700, 960)
  - step_id: click_login_button
    action:
      type: click_detected
      image: assets/btn_login_yellow.bmp
      roi: [1200, 880, 1700, 960]
      threshold: 0.8
      shrink_percent: 0.10
    next: wait_for_login_complete

  # Step 6: Wait for login to complete (check for confirm popup or game screen)
  # If popup appears, need to confirm character switch
  - step_id: wait_for_login_complete
    action:
      type: wait_image
      state: appear
      image: assets/login_popup_confirm.bmp
      roi: [1100, 700, 1500, 1100]
      threshold: 0.7
      timeout_ms: 3000
      poll_interval_ms: 100
    on_true: handle_login_confirm_popup
    on_false: wait_for_game_load
    next: handle_login_confirm_popup
    recovery:
      on_timeout: wait_for_game_load
      max_escalations: 1

  # Step 6a: Handle login confirm popup (character switch confirmation)
  - step_id: handle_login_confirm_popup
    action:
      type: click_detected
      image: assets/login_popup_confirm.bmp
      roi: [1100, 700, 1500, 1100]
      threshold: 0.7
      shrink_percent: 0.10
    next: wait_for_game_load

  # Step 7: Wait for game to load (character appears in game world)
  # Detect game UI elements that indicate successful login
  - step_id: wait_for_game_load
    action:
      type: wait_image
      state: appear
      image: assets/game_ui_loaded.bmp
      roi: [0, 0, 500, 500]
      threshold: 0.7
      timeout_ms: 30000
      poll_interval_ms: 500
    next: workflow_complete
    recovery:
      on_timeout: verify_character_selection_screen
      max_escalations: 2
      audit_context:
        phase: switch
        step_type: wait_game_load

  # Step 4b (alt path): Scroll down and continue searching
  - step_id: scroll_and_continue_search
    action:
      type: scroll
      direction: down
      ticks: 3
    next: wait_after_scroll_search

  - step_id: wait_after_scroll_search
    action:
      type: wait
      duration_ms: 300
    next: check_max_scroll_reached

  # Step 4c: Check if maximum scroll reached (no more characters)
  - step_id: check_max_scroll_reached
    action:
      type: wait
      duration_ms: 100
    on_true: character_not_found_error
    on_false: scan_current_visible_slots
    condition:
      type: scroll_limit_reached
      max_scroll_rows: 10

  # Error step: Character not found after full scan
  - step_id: character_not_found_error
    action:
      type: error
      error_code: CHARACTER_NOT_FOUND
      message: "Target character not found in account"
    next: null

  # Step 8: Workflow complete - character switched successfully
  - step_id: workflow_complete
    action:
      type: wait
      duration_ms: 100
    next: null
