# Guild Donation Workflow Configuration
# Complete automation workflow for guild donation across multiple characters
#
# This workflow demonstrates:
# - Explicit step IDs and next links
# - All action types: click, wait, press, scroll, wait_image
# - Conditional branching with image detection
# - Loop path for character iteration
# - Intelligent image-based waits replacing hardcoded delays
# - Recovery anchors for error rollback (ERR-02 compliance)

name: guild_donation
start_step_id: move_mouse_safe_position

wait_defaults:
  timeout_ms: 10000
  poll_interval_ms: 50
  retry_interval_ms: 1000

steps:
  # Step 0: Move mouse to safe position to avoid blocking UI detection
  # 将鼠标移至固定坐标，防止遮挡图像检测区域
  - step_id: move_mouse_safe_position
    action:
      type: move
      x: 536
      y: 346
    next: wait_after_move

  # Step 0b: Brief wait after move to ensure mouse is positioned
  - step_id: wait_after_move
    action:
      type: wait
      duration_ms: 50
    next: open_guild_menu

  # Step 1: Open guild menu with Alt+U
  # RECOVERY ANCHOR: Stable entry point for guild donation workflow
  - step_id: open_guild_menu
    action:
      type: press
      key_name: alt+u
    next: wait_menu_appear
    retry: 1
    recovery:
      anchor: true
      audit_context:
        phase: donation
        critical: true

  # Step 2: Wait for guild menu to appear (intelligent wait)
  # Recovery: rollback to anchor if menu doesn't appear
  # ROI: 546,803,903,835, 宽高(357,32) - 对比缓存 guild_ui.bmp
  - step_id: wait_menu_appear
    action:
      type: wait_image
      state: appear
      image: assets/resource/image/guild_ui.bmp
      roi: [546, 803, 903, 835]
      threshold: 0.7
      timeout_ms: 5000
      poll_interval_ms: 100
    next: wait_before_handle_first_confirm
    recovery:
      on_timeout: open_guild_menu
      max_escalations: 3
      audit_context:
        phase: donation
        step_type: wait_menu

  # Step 2.5: brief settle wait before first confirm click to avoid early-click miss
  - step_id: wait_before_handle_first_confirm
    action:
      type: wait
      duration_ms: 250
    next: handle_first_confirm

  # Step 3: Handle first confirm popup if present (detect + click)
  # 基于检测结果点击模板中心，避免 UI 位置浮动导致硬编码失效
  # 点不到则按 on_error 继续主流程
  - step_id: handle_first_confirm
    action:
      type: click_detected
      image: assets/resource/image/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8
      timeout_ms: 1000
      poll_interval_ms: 100
      center_click: true
    next: wait_after_handle_first_confirm_click
    on_error:
      - handle_first_confirm_fallback_click

  - step_id: wait_after_handle_first_confirm_click
    action:
      type: wait
      duration_ms: 120
    next: verify_first_confirm_disappear

  - step_id: verify_first_confirm_disappear
    action:
      type: wait_image
      state: disappear
      image: assets/resource/image/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8
      timeout_ms: 600
      poll_interval_ms: 100
    next: stage4_first_donation
    recovery:
      on_timeout: retry_handle_first_confirm
      max_escalations: 1

  - step_id: retry_handle_first_confirm
    action:
      type: click_detected
      image: assets/resource/image/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8
      timeout_ms: 1000
      poll_interval_ms: 100
      center_click: true
    next: wait_after_retry_handle_first_confirm
    on_error:
      - handle_first_confirm_fallback_click

  - step_id: wait_after_retry_handle_first_confirm
    action:
      type: wait
      duration_ms: 120
    next: verify_first_confirm_disappear_after_retry

  - step_id: verify_first_confirm_disappear_after_retry
    action:
      type: wait_image
      state: disappear
      image: assets/resource/image/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8
      timeout_ms: 600
      poll_interval_ms: 100
    next: stage4_first_donation
    recovery:
      on_timeout: handle_first_confirm_fallback_click
      max_escalations: 1

  # Step 3b: Fallback click for first confirm popup when template match times out
  # Click center of known confirm ROI to clear potential overlay
  - step_id: handle_first_confirm_fallback_click
    action:
      type: click
      x: 1280
      y: 797
      random_y: 8
    next: wait_after_first_confirm_fallback

  # Step 3c: Allow UI settle after fallback confirm click
  - step_id: wait_after_first_confirm_fallback
    action:
      type: wait
      duration_ms: 150
    next: verify_first_confirm_disappear_after_fallback

  - step_id: verify_first_confirm_disappear_after_fallback
    action:
      type: wait_image
      state: disappear
      image: assets/resource/image/guild_first_confirm.bmp
      roi: [1229, 657, 1331, 937]
      threshold: 0.8
      timeout_ms: 600
      poll_interval_ms: 100
    next: stage4_first_donation
    recovery:
      on_timeout: stage4_first_donation
      max_escalations: 1

  # Step 4: Stage 4 - Guild donation workflow
  # ROI: 1863,450,2019,483, 宽高(156,33)
  # Detect guild_first_donation.bmp and click
  - step_id: stage4_first_donation
    action:
      type: click_detected
      image: assets/resource/image/guild_first_donation.bmp
      roi: [1863, 450, 2019, 483]
      threshold: 0.8
      timeout_ms: 1000
      poll_interval_ms: 100
      shrink_percent: 0.10
    next: wait_before_stage4_second

  # Step 4a.5: Short settle wait for popup transition before second detection
  - step_id: wait_before_stage4_second
    action:
      type: wait
      duration_ms: 120
    next: stage4_second_donation

  # Step 4b: Second donation detection
  # ROI: 954,702,1077,742, 宽高(123,40)
  # Detect guild_first_donation2.bmp and click
  - step_id: stage4_second_donation
    action:
      type: click_detected
      image: assets/resource/image/guild_first_donation2.bmp
      roi: [954, 702, 1077, 742]
      threshold: 0.7
      timeout_ms: 1000
      poll_interval_ms: 100
      shrink_percent: 0.10
    next: wait_after_stage4_second_click

  # Step 4b.5: allow second-donation click to settle before ESC
  - step_id: wait_after_stage4_second_click
    action:
      type: wait
      duration_ms: 180
    next: press_esc_after_stage4

  # Step 4c: 按 ESC 关闭弹窗
  - step_id: press_esc_after_stage4
    action:
      type: press
      key_name: esc
    next: wait_after_stage4

  # Step 4d: 等待 UI 响应（20ms 延迟）
  - step_id: wait_after_stage4
    action:
      type: wait
      duration_ms: 100
    next: click_sec_donation1

  # Step 5: Click guild_sec_donation1 if present (detect + click)
  # y_offset: 0.5 限制点击区域，跳过上二分之一不可点击区域
  - step_id: click_sec_donation1
    action:
      type: click_detected
      image: assets/resource/image/guild_sec_donation1.bmp
      roi: [1551, 606, 1693, 635]
      threshold: 0.8
      timeout_ms: 1000
      poll_interval_ms: 100
      shrink_percent: 0.10
      y_offset: 0.5
    next: click_sec_donation2
    on_error:
      - no_support_today

  # Step 5b: Click detected guild_sec_donation2 at random position in ROI
  - step_id: click_sec_donation2
    action:
      type: click_detected
      image: assets/resource/image/guild_sec_donation2.bmp
      roi: [1010, 602, 1253, 794]
      threshold: 0.7
      timeout_ms: 1000
      poll_interval_ms: 100
      shrink_percent: 0.10
    next: wait_after_sec_donation2

  # Step 5c-delay: 等待 UI 响应（20ms 延迟）
  - step_id: wait_after_sec_donation2
    action:
      type: wait
      duration_ms: 50
    next: click_sec_donation2_fixed

  # Step 5d: Click at fixed position (1229, 937) with Y +/- 5px random
  # Hardcoded coordinates with small vertical randomization
  - step_id: click_sec_donation2_fixed
    action:
      type: click
      x: 1229
      y: 937
      random_y: 5
    next: donation_complete

  # Step 5d: No support today - press ESC and check UI closed
  - step_id: no_support_today
    action:
      type: press
      key_name: esc
    next: wait_no_support_ui_close

  # Step 5d-wait: Wait for UI to close after no support ESC
  - step_id: wait_no_support_ui_close
    action:
      type: wait_image
      state: disappear
      image: assets/resource/image/guild_ui.bmp
      roi: [546, 803, 903, 835]
      timeout_ms: 1000
      poll_interval_ms: 100
    next: workflow_complete
    recovery:
      on_timeout: check_no_support_ui_closed
      max_escalations: 10

  # Step 5d-check: Check if UI still visible after no support ESC
  - step_id: check_no_support_ui_closed
    action:
      type: wait
      duration_ms: 200
    on_true: final_esc_no_support
    on_false: workflow_complete
    condition:
      type: image
      template: assets/resource/image/guild_ui.bmp
      roi: [546, 803, 903, 835]
      threshold: 0.75

  # Step 5d-esc: Final ESC press if UI still visible (no support path)
  - step_id: final_esc_no_support
    action:
      type: press
      key_name: esc
    next: wait_after_no_support_esc

  # Step 5d-wait2: Wait UI response after ESC
  - step_id: wait_after_no_support_esc
    action:
      type: wait
      duration_ms: 300
    next: check_no_support_ui_closed

  # Step 6: Donation complete
  - step_id: donation_complete
    action:
      type: wait
      duration_ms: 20
    next: write_donation_cache

  # Step 6a: Write character donation status to cache
  # Placeholder: Records character ID (visual hash) and donation completion
  # TODO: Implement custom action type 'write_cache' in workflow_runtime.py
  - step_id: write_donation_cache
    action:
      type: wait
      duration_ms: 50
    next: press_esc_close

  # Step 6b: Press ESC to close guild menu
  - step_id: press_esc_close
    action:
      type: press
      key_name: esc
    next: wait_guild_ui_close

  # Step 6c: Wait for guild UI to close
  # Polls every 100ms with 500ms timeout
  # If timeout, go to check_ui_closed to determine next action
  - step_id: wait_guild_ui_close
    action:
      type: wait_image
      state: disappear
      image: assets/resource/image/guild_ui.bmp
      roi: [546, 803, 903, 835]
      timeout_ms: 1000
      poll_interval_ms: 100
    next: workflow_complete
    recovery:
      on_timeout: check_ui_closed
      max_escalations: 10

  # Step 6d: Check if guild UI is still visible after ESC
  # If still detected (true), press ESC again
  # If not detected (false), workflow completes
  - step_id: check_ui_closed
    action:
      type: wait
      duration_ms: 200
    on_true: final_esc_press
    on_false: workflow_complete
    condition:
      type: image
      template: assets/resource/image/guild_ui.bmp
      roi: [546, 803, 903, 835]
      threshold: 0.75

  # Step 6e: Final ESC press if UI still visible
  # 按ESC后等待UI响应，再次检测
  - step_id: final_esc_press
    action:
      type: press
      key_name: esc
    next: wait_after_final_esc

  # Step 6e-wait: 等待UI响应（300ms）
  - step_id: wait_after_final_esc
    action:
      type: wait
      duration_ms: 300
    next: check_ui_closed

  # Step 7: Workflow complete
  # Final step after guild UI is confirmed closed
  - step_id: workflow_complete
    action:
      type: wait
      duration_ms: 100
    next: null
