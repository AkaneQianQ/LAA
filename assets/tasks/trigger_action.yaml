# Trigger Action Workflow Configuration
# Image-triggered semi-automation workflow for Lost Ark
#
# This workflow implements:
# - Task A: Detect target_a.png, press Up-Up-Down sequence
# - Task B: Detect target_b_1.png or target_b_2.png, execute offset clicks + Enter
# - Continuous loop with cooldowns between detections

name: trigger_action
start_step_id: trigger_loop_entry

wait_defaults:
  timeout_ms: 10000
  poll_interval_ms: 20
  retry_interval_ms: 100

steps:
  # Entry point for trigger loop
  - step_id: trigger_loop_entry
    desc: "触发器循环入口"
    action:
      type: wait
      duration_ms: 20
    next: detect_target_a

  # Task A: Detect target_a.png
  - step_id: detect_target_a
    desc: "检测目标A图像"
    recognition:
      type: Custom
      custom_recognition: TriggerTargetADetection
      param:
        image: assets/target_a.png
        roi: [1088, 700, 1482, 846]
        threshold: 0.8
    action:
      type: Custom
      custom_action: PressUpUpDown
    next: task_a_cooldown
    on_error:
      - detect_target_b

  # Task A cooldown
  - step_id: task_a_cooldown
    desc: "任务A冷却"
    action:
      type: wait
      duration_ms: 300
    next: detect_target_a

  # Task B: Detect target_b images
  - step_id: detect_target_b
    desc: "检测目标B图像"
    recognition:
      type: Custom
      custom_recognition: TriggerTargetBDetection
      param:
        images:
          - assets/target_b_1.png
          - assets/target_b_2.png
        roi: [1280, 0, 2560, 1440]
        threshold: 0.8
    action:
      type: Custom
      custom_action: ExecuteOffsetClicks
      param:
        offsets: [[7, 0], [127, 0]]
        click_delay_ms: 300
    next: task_b_cooldown
    on_error:
      - trigger_loop_entry

  # Task B cooldown
  - step_id: task_b_cooldown
    desc: "任务B冷却"
    action:
      type: wait
      duration_ms: 300
    next: trigger_loop_entry
